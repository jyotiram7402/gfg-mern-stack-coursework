<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Example</title>

    <style>
        .box {
            width: 300px;
            padding: 20px;
            border: 5px solid black;
            margin: 30px;
            background-color: lightblue;
        }
    </style>
</head>
<body>

    <h1>CSS Box Model Example</h1>

    <div class="box">
        This is the content area of the box.
        <br><br>
        Padding: 20px<br>
        Border: 5px<br>
        Margin: 30px
    </div>

</body>
</html>
