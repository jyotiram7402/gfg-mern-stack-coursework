<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Painting</title>

    <style>
        body {
            background-color: black;
        }

        .frame {
            width: 250px;
            height: 450px;
            margin: 30px auto;
            background-color: #d98b6c;
            padding: 8px;
        }

        .orange {
            height: 180px;
            background-color: #d94a12;
            margin-bottom: 8px;
        }

        .pink {
            height: 90px;
            background-color: #c84d74;
            margin-bottom: 8px;
        }

        .blue {
            height: 120px;
            background-color: #2f73c9;
        }
    </style>
</head>
<body>

    <div class="frame">
        <div class="orange"></div>
        <div class="pink"></div>
        <div class="blue"></div>
    </div>

</body>
</html>
